<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - CA Sumit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">CA Sumit</div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Get in touch for expert financial advice</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <div class="contact-info">
                <h2>Contact Information</h2>
                <p><strong>CA Sumit</strong></p>
                <p>Chartered Accountant</p>
                <br>
                <p>Email: [your email]</p>
                <p>Phone: [your phone]</p>
                <p>Location: [your city]</p>
            </div>

            <div class="contact-form">
                <h2>Send a Message</h2>
                <form action="https://formspree.io/f/https://formspree.io/f/mzdygzll" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="service">Service Required</label>
                        <select id="service" name="service">
                            <option value="">Select a service</option>
                            <option value="tax">Tax Filing</option>
                            <option value="gst">GST Services</option>
                            <option value="audit">Audit</option>
                            <option value="bookkeeping">Bookkeeping</option>
                            <option value="advisory">Advisory</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 CA Sumit. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
